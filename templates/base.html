<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}InstaControl{% endblock %} — InstaControl</title>
  <style>
    :root {
      --bg:       #07071a;
      --surf:     #0d0d28;
      --surf2:    #13132f;
      --surf3:    #191938;
      --border:   #1f1f45;
      --ag:       linear-gradient(135deg,#7c3aed,#e1306c);
      --p:        #7c3aed;
      --pk:       #e1306c;
      --text:     #e8e8ff;
      --muted:    #6666a8;
      --success:  #22c55e;
      --warn:     #f59e0b;
      --danger:   #ef4444;
      --info:     #3b82f6;
      --r:        10px;
      --sw:       230px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);
      display:flex;height:100vh;overflow:hidden;
    }

    /* ── Sidebar ───────────────────────────────── */
    .sidebar{
      width:var(--sw);min-width:var(--sw);
      background:var(--surf);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      height:100vh;overflow:hidden;
    }
    .sb-logo{
      padding:20px 18px 16px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;
    }
    .sb-logo .icon{
      width:34px;height:34px;border-radius:10px;
      background:var(--ag);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;flex-shrink:0;
    }
    .sb-logo span{
      font-size:15px;font-weight:700;
      background:var(--ag);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .sb-nav{flex:1;padding:10px 0;overflow-y:auto;}
    .sb-nav a{
      display:flex;align-items:center;gap:10px;
      padding:10px 18px;color:var(--muted);
      text-decoration:none;font-size:14px;font-weight:500;
      transition:all .15s;border-left:3px solid transparent;
    }
    .sb-nav a:hover{color:var(--text);background:var(--surf2);}
    .sb-nav a.active{
      color:var(--text);background:var(--surf2);
      border-left-color:var(--p);
    }
    .sb-nav a .ni{font-size:16px;width:20px;text-align:center;}
    .sb-section{
      padding:6px 18px 2px;
      font-size:10px;font-weight:700;letter-spacing:.08em;
      color:var(--muted);text-transform:uppercase;margin-top:8px;
    }
    .sb-footer{
      padding:14px 18px;
      border-top:1px solid var(--border);
    }
    .sb-user{font-size:12px;color:var(--muted);margin-bottom:8px;word-break:break-all;}
    .sb-logout{
      display:block;text-align:center;
      padding:7px;border-radius:var(--r);
      background:var(--surf2);border:1px solid var(--border);
      color:var(--muted);text-decoration:none;font-size:13px;
      transition:all .15s;
    }
    .sb-logout:hover{color:var(--danger);border-color:var(--danger);}

    /* ── Main content ──────────────────────────── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .topbar{
      padding:0 24px;height:56px;
      background:var(--surf);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px;flex-shrink:0;
    }
    .topbar h1{font-size:18px;font-weight:700;}
    .topbar .badge{
      padding:3px 10px;border-radius:20px;
      background:var(--surf2);border:1px solid var(--border);
      font-size:11px;color:var(--muted);
    }
    .topbar .ml{margin-left:auto;}
    .content{flex:1;overflow-y:auto;padding:24px;}
    .content::-webkit-scrollbar{width:4px;}
    .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* ── Cards ─────────────────────────────────── */
    .card{
      background:var(--surf);border:1px solid var(--border);
      border-radius:var(--r);padding:20px;
    }
    .card-title{font-size:13px;font-weight:600;color:var(--muted);
      text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{
      background:var(--surf);border:1px solid var(--border);
      border-radius:var(--r);padding:18px;
    }
    .stat-icon{font-size:24px;margin-bottom:8px;}
    .stat-val{font-size:28px;font-weight:700;}
    .stat-label{font-size:12px;color:var(--muted);margin-top:2px;}

    /* ── Tables ────────────────────────────────── */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:14px;}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;
       color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
       border-bottom:1px solid var(--border);}
    td{padding:12px 14px;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--surf2);}

    /* ── Forms ─────────────────────────────────── */
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);
          margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
    input[type=text],input[type=email],input[type=password],
    input[type=datetime-local],select,textarea{
      width:100%;background:var(--surf2);
      border:1px solid var(--border);border-radius:var(--r);
      padding:10px 12px;color:var(--text);font-size:14px;
      outline:none;transition:border-color .2s;font-family:inherit;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--p);}
    input::placeholder,textarea::placeholder{color:var(--muted);}
    select option{background:var(--surf2);}
    textarea{resize:vertical;min-height:80px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

    /* ── Buttons ───────────────────────────────── */
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 18px;border-radius:var(--r);border:none;
      font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;
      text-decoration:none;
    }
    .btn-primary{background:var(--ag);color:#fff;}
    .btn-primary:hover{opacity:.85;}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
    .btn-outline:hover{border-color:var(--p);color:var(--p);}
    .btn-danger{background:transparent;border:1px solid var(--border);color:var(--danger);}
    .btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
    .btn-success{background:#16a34a;color:#fff;}
    .btn-success:hover{background:#15803d;}
    .btn-sm{padding:5px 12px;font-size:12px;}
    .btn:disabled{opacity:.4;cursor:default;}

    /* ── Badges ────────────────────────────────── */
    .badge-pill{
      display:inline-block;padding:3px 9px;border-radius:20px;
      font-size:11px;font-weight:600;
    }
    .badge-success{background:#14532d;color:var(--success);}
    .badge-warning{background:#451a03;color:var(--warn);}
    .badge-danger{background:#450a0a;color:var(--danger);}
    .badge-info{background:#1e3a5f;color:var(--info);}
    .badge-muted{background:var(--surf3);color:var(--muted);}

    /* ── Toggle ────────────────────────────────── */
    .toggle{position:relative;display:inline-block;width:44px;height:24px;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{
      position:absolute;inset:0;background:var(--surf3);
      border-radius:24px;cursor:pointer;transition:.2s;
      border:1px solid var(--border);
    }
    .toggle-slider:before{
      content:"";position:absolute;width:16px;height:16px;
      left:3px;top:3px;background:var(--muted);
      border-radius:50%;transition:.2s;
    }
    .toggle input:checked + .toggle-slider{background:var(--p);border-color:var(--p);}
    .toggle input:checked + .toggle-slider:before{transform:translateX(20px);background:#fff;}

    /* ── Toast ─────────────────────────────────── */
    #toast{
      position:fixed;bottom:20px;right:20px;
      background:var(--surf2);border:1px solid var(--border);
      padding:12px 18px;border-radius:var(--r);font-size:14px;
      opacity:0;transform:translateY(8px);
      transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;
    }
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.ok{border-color:var(--success);color:var(--success);}
    #toast.err{border-color:var(--danger);color:var(--danger);}

    /* ── Utils ─────────────────────────────────── */
    .flex{display:flex;align-items:center;}
    .gap-2{gap:8px;}
    .gap-3{gap:12px;}
    .ml-auto{margin-left:auto;}
    .mt-2{margin-top:8px;}
    .mt-3{margin-top:12px;}
    .mb-3{margin-bottom:12px;}
    .mb-4{margin-bottom:16px;}
    .text-muted{color:var(--muted);}
    .text-sm{font-size:12px;}
    .mono{font-family:monospace;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
    .empty{text-align:center;padding:48px;color:var(--muted);font-size:14px;}
    .code-block{
      background:var(--surf2);border:1px solid var(--border);
      border-radius:var(--r);padding:14px 16px;
      font-family:monospace;font-size:13px;
      overflow-x:auto;white-space:pre;
    }
    .copy-wrap{position:relative;}
    .copy-wrap .copy-btn{
      position:absolute;top:8px;right:8px;
      background:var(--surf3);border:1px solid var(--border);
      color:var(--muted);border-radius:6px;padding:3px 8px;
      font-size:11px;cursor:pointer;
    }
    .copy-wrap .copy-btn:hover{color:var(--text);}

    @media(max-width:768px){
      .sidebar{width:60px;min-width:60px;}
      .sb-logo span,.sb-nav a span:not(.ni),.sb-section,.sb-user{display:none;}
      .sb-nav a{justify-content:center;padding:12px;}
      .stats-grid{grid-template-columns:1fr 1fr;}
      .form-row,.form-row-3{grid-template-columns:1fr;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo">
    <div class="icon">📸</div>
    <span>InstaControl</span>
  </div>
  <div class="sb-nav">
    <div class="sb-section">Main</div>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
      <span class="ni">📊</span><span>Dashboard</span>
    </a>
    <a href="/chat" class="{% if request.path == '/chat' %}active{% endif %}">
      <span class="ni">💬</span><span>Chat</span>
    </a>
    <a href="/queue" class="{% if request.path == '/queue' %}active{% endif %}">
      <span class="ni">📅</span><span>Message Queue</span>
    </a>
    <div class="sb-section">Automation</div>
    <a href="/wakewords" class="{% if request.path == '/wakewords' %}active{% endif %}">
      <span class="ni">⚡</span><span>Wakewords</span>
    </a>
    <a href="/ai-agent" class="{% if request.path == '/ai-agent' %}active{% endif %}">
      <span class="ni">🤖</span><span>AI Agent</span>
    </a>
    <div class="sb-section">Developer</div>
    <a href="/api-keys" class="{% if request.path == '/api-keys' %}active{% endif %}">
      <span class="ni">🔑</span><span>API Keys</span>
    </a>
  </div>
  <div class="sb-footer">
    <div class="sb-user">{{ session.get('email','') }}</div>
    <a href="/logout" class="sb-logout">Sign out</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <h1>{{ self.title() }}</h1>
    {% block topbar_extra %}{% endblock %}
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<div id="toast"></div>

<script>
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3200);
}
async function apiFetch(url, opts={}) {
  const res = await fetch(url, {
    headers: {'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!'));
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
