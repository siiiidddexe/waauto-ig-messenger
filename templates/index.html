<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Messenger</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e1306c;
      --accent2: #833ab4;
      --text: #f0f0f0;
      --muted: #888;
      --bubble-in: #1e1e1e;
      --bubble-out: linear-gradient(135deg, #833ab4, #e1306c);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    #sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #sidebar-header .logo {
      width: 32px; height: 32px;
      background: var(--bubble-out);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      background: var(--bubble-out);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #refresh-btn {
      margin-left: auto;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px;
      transition: color .2s;
    }
    #refresh-btn:hover { color: var(--text); }

    #search-box {
      margin: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      width: calc(100% - 24px);
    }
    #search-box::placeholder { color: var(--muted); }

    #conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .conv-item:hover, .conv-item.active { background: var(--surface2); }
    .conv-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--bubble-out);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    #chat-header .chat-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--bubble-out);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      overflow: hidden;
    }
    #chat-header .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    #chat-title { font-weight: 700; font-size: 16px; }
    #chat-subtitle { font-size: 12px; color: var(--muted); }
    #chat-id-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 8px;
      border-radius: 6px;
      font-family: monospace;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.outbound { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .msg-row.inbound .msg-bubble {
      background: var(--bubble-in);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg-row.outbound .msg-bubble {
      background: var(--bubble-out);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin: 2px 4px;
      white-space: nowrap;
    }
    .msg-media img {
      max-width: 220px;
      max-height: 220px;
      border-radius: 12px;
      display: block;
    }
    .msg-media-label {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    .date-divider {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0;
    }
    .date-divider span {
      background: var(--surface2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── Composer ── */
    #composer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent2); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bubble-out);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:active { transform: scale(.93); }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }
    #send-btn:disabled { opacity: .4; cursor: default; }

    /* ── Welcome / no-conv state ── */
    #no-conv {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }
    #no-conv .icon {
      font-size: 64px;
      background: var(--bubble-out);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #no-conv h2 { font-size: 20px; color: var(--text); }
    #no-conv p { font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: var(--accent); color: var(--accent); }
    #toast.success { border-color: #2ecc71; color: #2ecc71; }

    @media (max-width: 600px) {
      #sidebar { width: 70px; min-width: 70px; }
      #sidebar-header h1, #search-box, .conv-info, .conv-time { display: none; }
      .conv-item { justify-content: center; padding: 10px; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">📸</div>
    <h1>IG Messenger</h1>
    <button id="refresh-btn" title="Refresh">↻</button>
  </div>
  <input id="search-box" type="text" placeholder="Search conversations…" />
  <div id="conv-list">
    <div class="empty-state">Loading conversations…</div>
  </div>
</div>

<!-- Chat panel -->
<div id="chat">
  <div id="no-conv">
    <div class="icon">💬</div>
    <h2>Instagram Messenger</h2>
    <p>Select a conversation to get started</p>
  </div>

  <div id="chat-active" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <div id="chat-header">
      <div class="chat-avatar" id="header-avatar">?</div>
      <div>
        <div id="chat-title">—</div>
        <div id="chat-subtitle">Instagram</div>
      </div>
      <div id="chat-id-badge">—</div>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let activeConvId = null;
  let allConvs = [];
  let pollTimer = null;

  const $ = id => document.getElementById(id);

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3000);
  }

  // ── Time formatting ────────────────────────────────────────────────────────
  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }
  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      const today = new Date();
      const diff = Math.floor((today - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      return d.toLocaleDateString();
    } catch { return ''; }
  }

  // ── Avatar initials ────────────────────────────────────────────────────────
  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  }

  // ── Load conversations ─────────────────────────────────────────────────────
  async function loadConversations() {
    try {
      const res = await fetch('/api/conversations');
      allConvs = await res.json();
      renderConvList(allConvs);
    } catch(e) {
      console.error(e);
    }
  }

  function renderConvList(convs) {
    const q = $('search-box').value.toLowerCase();
    const filtered = convs.filter(c =>
      (c.username || c.id).toLowerCase().includes(q)
    );
    const el = $('conv-list');
    if (!filtered.length) {
      el.innerHTML = '<div class="empty-state">No conversations yet.<br>Messages will appear here.</div>';
      return;
    }
    el.innerHTML = filtered.map(c => `
      <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" data-id="${c.id}">
        <div class="conv-avatar">
          ${c.profile_pic ? `<img src="${c.profile_pic}" alt="" />` : initials(c.username || c.id)}
        </div>
        <div class="conv-info">
          <div class="conv-name">${escHtml(c.username || c.id)}</div>
          <div class="conv-preview">${escHtml(c.last_message || 'No messages yet')}</div>
        </div>
        <div class="conv-time">${c.last_ts ? fmtTime(c.last_ts) : ''}</div>
      </div>
    `).join('');

    el.querySelectorAll('.conv-item').forEach(item => {
      item.addEventListener('click', () => openConversation(item.dataset.id));
    });
  }

  $('search-box').addEventListener('input', () => renderConvList(allConvs));
  $('refresh-btn').addEventListener('click', () => {
    loadConversations();
    if (activeConvId) loadMessages(activeConvId, false);
  });

  // ── Open conversation ──────────────────────────────────────────────────────
  function openConversation(id) {
    activeConvId = id;
    const conv = allConvs.find(c => c.id === id) || { id, username: id };

    $('no-conv').style.display = 'none';
    $('chat-active').style.display = 'flex';

    // Header
    $('chat-title').textContent = conv.username || id;
    $('chat-id-badge').textContent = id;
    const av = $('header-avatar');
    if (conv.profile_pic) {
      av.innerHTML = `<img src="${conv.profile_pic}" alt=""/>`;
    } else {
      av.textContent = initials(conv.username || id);
    }

    // Update sidebar active state
    renderConvList(allConvs);

    loadMessages(id, true);

    // Poll for new messages every 5 s
    clearInterval(pollTimer);
    pollTimer = setInterval(() => loadMessages(id, false), 5000);
  }

  // ── Load messages ──────────────────────────────────────────────────────────
  let lastMsgCount = 0;

  async function loadMessages(convId, scroll) {
    try {
      const res = await fetch(`/api/conversations/${convId}/messages`);
      const msgs = await res.json();
      if (msgs.length === lastMsgCount && !scroll) return;
      lastMsgCount = msgs.length;
      renderMessages(msgs, scroll || msgs.length !== lastMsgCount);
    } catch(e) {
      console.error(e);
    }
  }

  function renderMessages(msgs, scroll) {
    const el = $('messages');
    let lastDate = null;
    el.innerHTML = msgs.map(m => {
      const dateLabel = fmtDate(m.timestamp);
      let divider = '';
      if (dateLabel !== lastDate) {
        lastDate = dateLabel;
        divider = `<div class="date-divider"><span>${dateLabel}</span></div>`;
      }
      const bubble = m.media_url
        ? `<div class="msg-media">
             <img src="${escHtml(m.media_url)}" alt="${m.media_type||'media'}"
                  onerror="this.style.display='none';this.nextSibling.style.display='block'"/>
             <div class="msg-media-label" style="display:none">[${m.media_type||'media'}]</div>
           </div>`
        : escHtml(m.text || '');
      return `${divider}<div class="msg-row ${m.direction}">
        <div class="msg-bubble">${bubble}</div>
        <div class="msg-time">${fmtTime(m.timestamp)}</div>
      </div>`;
    }).join('');

    if (scroll) el.scrollTop = el.scrollHeight;
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    if (!activeConvId) return;
    const input = $('msg-input');
    const text = input.value.trim();
    if (!text) return;

    $('send-btn').disabled = true;
    input.value = '';
    autoResizeTextarea(input);

    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recipient_id: activeConvId, text })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Send failed');
      toast('Sent ✓', 'success');
      await loadMessages(activeConvId, true);
      await loadConversations();
    } catch(e) {
      toast(e.message, 'error');
      input.value = text; // restore
    } finally {
      $('send-btn').disabled = false;
      input.focus();
    }
  }

  $('send-btn').addEventListener('click', sendMessage);
  $('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $('msg-input').addEventListener('input', function() { autoResizeTextarea(this); });

  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Escape HTML ────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadConversations();
  setInterval(loadConversations, 10000);
</script>
</body>
</html>
