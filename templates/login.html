<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — InstaControl</title>
  <style>
    :root{--p:#7c3aed;--pk:#e1306c;--bg:#07071a;--surf:#0d0d28;--border:#1f1f45;--text:#e8e8ff;--muted:#6666a8;--danger:#ef4444;--r:12px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{width:100%;max-width:400px;padding:24px;}
    .logo{text-align:center;margin-bottom:32px;}
    .logo-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#e1306c);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
    .logo h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#e1306c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
    .card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px;}
    .err{background:#450a0a;border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
    input{width:100%;background:#13132f;border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
    input:focus{border-color:var(--p);}
    input::placeholder{color:var(--muted);}
    .btn{width:100%;padding:12px;border-radius:var(--r);border:none;background:linear-gradient(135deg,#7c3aed,#e1306c);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;}
    .btn:hover{opacity:.85;}
    .footer{text-align:center;margin-top:20px;font-size:12px;color:var(--muted);}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">📸</div>
    <h1>InstaControl</h1>
    <p>Instagram Messaging Dashboard</p>
  </div>
  <div class="card">
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer">instapy.logiclaunch.in</div>
</div>
</body>
</html>
